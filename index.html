<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAB Bağış Programı</title>

    <!-- Excel Kütüphanesi (SheetJS) -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #ffffff;
        }

        /* BAŞLIK VE LOGO */
        h1 {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        /* ANA FORM ALANI */
        .form-alani {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 200px;
            margin-bottom: 20px;
        }

        /* İÇ DİV'LER (Inputlar ve Butonlar Alt Alta) */
        .form-alani>div {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #listeAlani {
            margin-top: 20px;
        }

        /* INPUT STILLERI */
        #ogrenciIsmi,
        #ogrenciSinifi,
        #ogrenciBagisi {
            width: 180px;
            height: 42px;
            padding: 8px 12px;
            font-size: 14px;
            border: 2px solid #000000;
            border-radius: 4px;
            box-sizing: border-box;
            outline: none;
            color: #000000;
            /* Şeffaflık hatası düzeltildi */
            background-color: #ffffff;
        }

        /* BUTON STILLERI */
        #btnGonder,
        #btnGoster,
        #btnExcel {
            width: 180px;
            height: 42px;
            font-size: 14px;
            font-weight: bold;
            color: #ffffff;
            /* Okunabilirlik için beyaz yapıldı */
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        /* Her bir bağış kaydının dikey/yatay düzeni */
        .bagis-satiri {
            display: flex;
            justify-content: space-between;
            /* Yazıyı sola, butonu en sağa yaslar */
            align-items: center;
            /* Dikeyde ortalar */
            background-color: #f9f9f9;
            padding: 12px 15px;
            margin-bottom: 10px;
            border-left: 4px solid #2980b9;
            /* Sol tarafa mavi şerit ekler */
            border-radius: 4px;
            max-width: 500px;
            /* Satırın çok uzamaması için */
        }

        /* Yan Yana Duracak Sil Butonunun Stili */
        .btn-tekli-sil {
            background-color: #e74c3c;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            padding: 8px 12px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-tekli-sil:hover {
            background-color: #c0392b;
        }

        #btnGonder {
            background-color: #27ae60;
        }

        #btnGonder:hover {
            background-color: #219150;
        }

        #btnGoster {
            background-color: #2980b9;
        }

        #btnGoster:hover {
            background-color: #1f6391;
        }

        /* EXCEL BUTONU STILI */
        #btnExcel {
            background-color: #8e44ad;
        }

        #btnExcel:hover {
            background-color: #71368a;
        }
    </style>
</head>

<body>

    <h1>ASÜS İlkokulu Okul Aile Birliği Bağış Takip Sistemi<img src="asus.jpeg" alt="ASÜS Logo" width="100"></h1>

    <div class="form-alani">
        <div>
            <input type="text" id="ogrenciIsmi" placeholder="Öğrencinin Adı Soyadı">
            <input type="text" id="ogrenciSinifi" placeholder="Sınıfı">
            <input type="number" id="ogrenciBagisi" placeholder="Bağış Miktarı">
        </div>
        <div>
            <button id="btnGonder" onclick="ogrenciTanimla()">Kaydet</button>
            <button id="btnGoster" onclick="bagislariGoster()">Bağışları Göster</button>
            <button id="btnExcel" onclick="exceleAktar()">Excel'e Aktar</button>
        </div>
    </div>

    <hr>

    <div id="listeAlani"></div>

    <script src="app.js"></script>
</body>

</html>
