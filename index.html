<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAB Bağış Programı</title>
    
    <style>
        /* Genel sayfa stili */
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #5dffff;
        }
        input, button {
            padding: 10px 14px;
            font-size: 14px;
            border-radius: 6px;
            border: 1px solid #ccc;
            margin: 4px;
        }

        /* Kutulara odaklanıldığında güzel dursun */
        input:focus {
            border-color: #007bff;
            outline: none;
        }

        /* Buton stilleri */
        button {
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #0056b3;
        }

        /* Kırmızı Sil Butonu */
        .btn-sil {
            background-color: #dc3545;
        }

        .btn-sil:hover {
            background-color: #a71d2a;
        }

        /* Form elemanlarını hizalayan ana kapsayıcı */
        .form-alani {
            display: flex;
            flex-wrap: wrap; /* Ekran daralırsa alt satıra otomatik geçer */
            gap: 10px; /* Elemanların tam arasındaki boşluk */
            margin-bottom: 20px;
        }

        /* Çıktıların yazdırılacağı liste alanı */
        #listeAlani {
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h2>OAB Bağış Takip Sistemi</h2>

    <!-- Elemanları düzgün tutan esnek kutu -->
    <div class="form-alani">
        <input type="text" id="ogrenciIsmi" placeholder="Öğrenci Adı Soyadı ">
        <input type="text" id="ogrenciSinifi" placeholder="Sınıfı">
        <input type="number" id="ogrenciBagisi" placeholder="Bağış Miktarı">
        
        <button onclick="ogrenciTanimla()">Gönder</button>
        <button onclick="bagislariGoster()">Bağışları Göster</button>
        <button class="btn-sil" onclick="verileriSil()">Tüm Verileri Sil</button>
    </div>

    <hr>

    <div id="listeAlani"></div>

    <script src="app.js"></script>
</body>
</html>
