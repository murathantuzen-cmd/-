<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAB Bağış Programı</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #ffffff;
        }

        /* BAŞLIK VE LOGO */
        h1 {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        /* ANA FORM ALANI */
        .form-alani {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 200px; /* Elemanların hizalı durması için genişlik */
            margin-bottom: 20px;
        }

        /* İÇ DİV'LER (Inputlar ve Butonlar Alt Alta) */
        .form-alani > div {
            display: flex;
            flex-direction: column; /* İçindekileri alt alta dizer */
            gap: 10px;               /* Elemanlar arasındaki boşluk */
        }

        #listeAlani {
            margin-top: 20px;
        }

        /* İSİM INPUT'U */
        #ogrenciIsmi {
            width: 180px;
            height: 42px;
            padding: 8px 12px;
            font-size: 14px;
            color: #333333;
            background-color: #ffffff;
            border: 2px solid #000000;
            border-radius: 4px;
            box-sizing: border-box;
            outline: none;
        }

        /* SINIF INPUT'U */
        #ogrenciSinifi {
            width: 180px; /* Bütünlük için isim inputu ile eşitlendi */
            height: 42px;
            padding: 8px 12px;
            font-size: 14px;
            color: #2c3e50;
            background-color: #f8f9fa;
            border: 2px solid #000000;
            border-radius: 4px;
            box-sizing: border-box;
            outline: none;
        }

        /* BAĞIŞ INPUT'U */
        #ogrenciBagisi {
            width: 180px; /* Bütünlük için isim inputu ile eşitlendi */
            height: 42px;
            font-size: 14px;
            color: #000000;
            background-color: #ffffff;
            border: 2px solid #000000;
            border-radius: 4px;
            box-sizing: border-box;
            outline: none;
        }

        /* GÖNDER BUTONU */
        #btnGonder {
            width: 180px;
            height: 42px;
            font-size: 14px;
            font-weight: bold;
            color: #ffffff;
            background-color: #27ae60;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        #btnGonder:hover {
            background-color: #219150;
        }

        /* BAĞIŞLARI GÖSTER BUTONU */
        #btnGoster {
            width: 180px;
            height: 42px;
            font-size: 14px;
            font-weight: bold;
            color: #ffffff;
            background-color: #2980b9;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        #btnGoster:hover {
            background-color: #1f6391;
        }

        /* TÜM VERİLERİ SİL BUTONU */
        #btnSil {
            width: 160px;
            height: 42px;
            font-size: 14px;
            font-weight: bold;
            color: #ffffff;
            background-color: #e74c3c;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        #btnSil:hover {
            background-color: #c0392b;
        }
    </style>
</head>

<body>

    <h1>ASÜS İlkokuklu Okul Aile Birliği Bağış Takip Sistemi<img src="asus.jpeg" alt="ASÜS Logo" width="100"></h1>

    <div class="form-alani">
        <div>
            <input type="text" id="ogrenciIsmi" placeholder="Öğrencinin Adı Soyadı">
            <input type="text" id="ogrenciSinifi" placeholder="Sınıfı">
            <input type="number" id="ogrenciBagisi" placeholder=" Bağış Miktarı">
        </div>
        <div>
            <button id="btnGoster" onclick="bagislariGoster()">Bağışları Göster</button>
            <button id="btnGonder" onclick="ogrenciTanimla()">Gönder</button>
        </div>
        
    </div>

    <hr>

    <div id="listeAlani"></div>

    <script src="app.js"></script>
</body>

</html>
