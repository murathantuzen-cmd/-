<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAB Bağış Programı</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f6f9;
        }

        .form-alani {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        #listeAlani {
            margin-top: 20px;
        }

        /* İSİM INPUT'U */
        #ogrenciIsmi {
            width: 180px;
            height: 42px;
            padding: 8px 12px;
            font-size: 14px;
            color: #333333;
            background-color: #ffffff;
            border: 2px solid #000000;
            border-radius: 4px;
            box-sizing: border-box;
            outline: none;
        }

        /* SINIF INPUT'U */
        #ogrenciSinifi {
            width: 120px;
            height: 42px;
            padding: 8px 12px;
            font-size: 14px;
            color: #2c3e50;
            background-color: #f8f9fa;
            border: 2px solid #000000;
            border-radius: 4px;
            box-sizing: border-box;
            outline: none;
        }

        /* BAĞIŞ INPUT'U */
        #ogrenciBagisi {
            width: 160px;
            height: 42px;
            font-size: 14px;
            color: #000000;
            background-color: #ffffff;
            border: 2px solid #000000;
            border-radius: 4px;
            box-sizing: border-box;
            outline: none;
        }

        /* GÖNDER BUTONU */
        #btnGonder {
            width: 100px;
            height: 42px;
            font-size: 14px;
            font-weight: bold;
            color: #ffffff;
            background-color: #27ae60;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        #btnGonder:hover {
            background-color: #219150;
        }

        /* BAĞIŞLARI GÖSTER BUTONU */
        #btnGoster {
            width: 150px;
            height: 42px;
            font-size: 14px;
            font-weight: bold;
            color: #ffffff;
            background-color: #2980b9;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        #btnGoster:hover {
            background-color: #1f6391;
        }

        /* TÜM VERİLERİ SİL BUTONU */
        #btnSil {
            width: 160px;
            height: 42px;
            font-size: 14px;
            font-weight: bold;
            color: #ffffff;
            background-color: #e74c3c;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        #btnSil:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

    <h2>ASÜS İlkokuklu Okul Aile Birliği Bağış Takip Sistemi</h2>

    <div class="form-alani">
        <input type="text" id="ogrenciIsmi" placeholder="Öğrencinin Adı Soyadı">
        <input type="text" id="ogrenciSinifi" placeholder="Sınıfı">
        <input type="number" id="ogrenciBagisi" placeholder=" Bağış Miktarı">
        
        <button id="btnGonder" onclick="ogrenciTanimla()">Gönder</button>
        <button id="btnGoster" onclick="bagislariGoster()">Bağışları Göster</button>
        <button id="btnSil" onclick="verileriSil()">Tüm Verileri Sil</button>
    </div>

    <hr>

    <div id="listeAlani"></div>

    <script src="app.js"></script>
</body>
</html>
